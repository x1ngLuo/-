<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>植物科学实验室 · 智能养护系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap');
        * { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        body { background-color: #f5f7f0; -webkit-tap-highlight-color: transparent; }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
        .glass-card { background: rgba(255, 255, 255, 0.92); backdrop-filter: blur(12px); }
        .ai-content h1, .ai-content h2, .ai-content h3 { font-weight: 700; margin-top: 1rem; color: #0a5c3e; font-size: 1rem; }
        .ai-content p { margin-bottom: 0.75rem; line-height: 1.55; color: #1e2a2c; }
        .ai-content ul { list-style-type: disc; padding-left: 1.25rem; margin-bottom: 1rem; }
        .ai-content li { margin-bottom: 0.3rem; }
        .fade-enter { animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
        .modal-mask { background: rgba(0,0,0,0.5); backdrop-filter: blur(3px); }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: #e9ecef; border-radius: 8px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #9ca3af; border-radius: 8px; }
    </style>
</head>
<body class="min-h-screen flex justify-center items-center">

<div id="app" class="w-full max-w-md bg-white shadow-2xl flex flex-col h-screen relative overflow-hidden rounded-none md:rounded-3xl">
    <!-- 顶部导航栏 -->
    <header class="bg-white/90 backdrop-blur-sm border-b border-emerald-100/60 p-4 flex justify-between items-center z-30 sticky top-0">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-emerald-700 rounded-xl flex items-center justify-center shadow-sm">
                <i data-lucide="leaf" class="text-white w-5 h-5"></i>
            </div>
            <h1 class="text-lg font-bold text-slate-800 tracking-tight">植物科学实验室</h1>
        </div>
        <div class="flex items-center gap-2">
            <button id="apiKeyBtn" class="bg-slate-100 p-2 rounded-full hover:bg-slate-200 transition">
                <i data-lucide="key" class="w-4 h-4 text-slate-500"></i>
            </button>
            <div class="bg-emerald-50 px-2.5 py-1.5 rounded-full text-[10px] text-emerald-800 font-medium flex items-center gap-1.5">
                <span class="relative flex h-2 w-2">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-500 opacity-60"></span>
                    <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-600"></span>
                </span>
                国内模型 · 联网检索
            </div>
        </div>
    </header>

    <!-- 主内容区 (滚动) -->
    <main id="main-content" class="flex-1 overflow-y-auto pb-24 bg-gradient-to-b from-slate-50 to-white custom-scroll"></main>

    <!-- 底部导航栏 -->
    <nav class="absolute bottom-0 w-full bg-white/90 backdrop-blur-md border-t border-slate-100 flex justify-around p-2 safe-bottom shadow-[0_-4px_12px_-2px_rgba(0,0,0,0.05)] z-40">
        <button onclick="switchTab('archive')" id="nav-archive" class="nav-item flex flex-col items-center gap-0.5 transition-all duration-200 text-slate-400">
            <i data-lucide="database" class="w-5 h-5"></i>
            <span class="text-[10px] font-medium">档案库</span>
        </button>
        <button onclick="switchTab('care')" id="nav-care" class="nav-item flex flex-col items-center gap-0.5 transition-all duration-200 text-slate-400">
            <i data-lucide="thermometer-sun" class="w-5 h-5"></i>
            <span class="text-[10px] font-medium">智能养护</span>
        </button>
        <button onclick="switchTab('clinic')" id="nav-clinic" class="nav-item flex flex-col items-center gap-0.5 transition-all duration-200 text-slate-400">
            <i data-lucide="microscope" class="w-5 h-5"></i>
            <span class="text-[10px] font-medium">病理诊断</span>
        </button>
        <button onclick="switchTab('community')" id="nav-community" class="nav-item flex flex-col items-center gap-0.5 transition-all duration-200 text-slate-400">
            <i data-lucide="globe" class="w-5 h-5"></i>
            <span class="text-[10px] font-medium">交流区</span>
        </button>
    </nav>
</div>

<!-- 全局toast -->
<div id="toast" class="fixed bottom-28 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-5 py-2.5 rounded-full text-xs font-medium opacity-0 transition-all pointer-events-none z-50 shadow-xl whitespace-nowrap"></div>

<!-- API 设置模态框 -->
<div id="apiModal" class="fixed inset-0 z-50 hidden items-center justify-center px-4 modal-mask transition-all" onclick="if(event.target===this) closeApiModal()">
    <div class="bg-white rounded-3xl w-full max-w-sm p-6 shadow-2xl animate-in fade-in zoom-in-95">
        <div class="flex justify-between items-center mb-4">
            <h3 class="font-bold text-slate-800">🔑 配置 AI 模型 (DeepSeek)</h3>
            <button onclick="closeApiModal()" class="text-slate-400"><i data-lucide="x" class="w-5 h-5"></i></button>
        </div>
        <p class="text-xs text-slate-500 mb-3">使用国内可用 DeepSeek API (支持联网搜索)。输入你的 API Key 即可使用全部养护/诊断功能。</p>
        <input type="password" id="apiKeyInput" placeholder="sk-xxxxxxxxxxxxx" class="w-full p-3 bg-slate-50 rounded-xl border border-slate-200 text-sm outline-none focus:ring-2 focus:ring-emerald-400">
        <div class="flex gap-3 mt-5">
            <button onclick="saveApiKey()" class="flex-1 bg-emerald-700 text-white py-2.5 rounded-xl text-sm font-semibold">保存并启用</button>
            <button onclick="closeApiModal()" class="flex-1 border border-slate-200 py-2.5 rounded-xl text-sm">取消</button>
        </div>
        <p class="text-[10px] text-slate-400 mt-3 text-center">获取 key: <a href="https://platform.deepseek.com/api_keys" target="_blank" class="text-emerald-600 underline">platform.deepseek.com</a></p>
    </div>
</div>

<script>
    // ----------------------------- 全局配置 -----------------------------
    let state = {
        activeTab: 'care',      // 默认显示养护页
        archives: JSON.parse(localStorage.getItem('v2_archives')) || [],
        posts: JSON.parse(localStorage.getItem('v2_posts')) || [
            { id: 1, author: "🌿 管理员", content: "科学养护从每日观察开始。记录你的植物，让绿意生长。", likes: 12, liked: false, comments: [{ text: "很实用的系统！", time: "2025-02-18" }] }
        ]
    };
    let apiKey = localStorage.getItem('deepseek_api_key') || "";
    
    // 系统提示 (专业+强制联网+分段分点+猫咪彩蛋)
    const SYSTEM_PROMPT = `你是一位资深植物学及园艺专家，同时拥有农艺师背景。每次回答用户问题之前，你必须主动结合联网搜索结果(实时资料、气候数据、植保文献)来提供科学建议。
    要求：
    1. 结构清晰：使用分段、分点（数字或圆点）说明，确保可读性。
    2. 语气专业严谨：避免任何不必要的比喻、拟人、夸张语气或网络流行语。不要出现“首先、其次、然后”等模板化连词堆砌，直接给出实质内容。
    3. 实用性：所有建议必须可操作，包含具体数值（如浇水毫升、光照小时、肥料配比）。
    4. 彩蛋：回答的最末尾，另起一行加上一句极短的猫咪风格碎碎念（用🐱符号开头，例如“🐱 喵~ 今天也要记得给绿植转盆哦”），且不影响正文专业性。
    5. 拒绝空话：如果用户信息不足，请礼貌追问关键点，不要编造数据。`;

    // 通用显示提示
    function showToast(msg, duration = 2200) {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.style.opacity = '1';
        t.style.transform = 'translateX(-50%) translateY(0)';
        setTimeout(() => { t.style.opacity = '0'; }, duration);
    }

    // ----------------------------- AI 调用 (DeepSeek + 联网搜索) -----------------------------
    async function callAI(userQuery, imageData = null) {
        if (!apiKey || apiKey.trim() === "") {
            showToast("⚠️ 请先点击右上角🔑设置 DeepSeek API Key", 3000);
            throw new Error("No API Key");
        }
        // 若上传图片但模型不支持视觉 → 友好提示并仅使用文本
        if (imageData) {
            showToast("📸 当前模型基于文本分析，已忽略图片，请尽量详细描述病症细节", 2000);
        }

        const requestBody = {
            model: "deepseek-chat",
            messages: [
                { role: "system", content: SYSTEM_PROMPT },
                { role: "user", content: userQuery }
            ],
            temperature: 0.4,
            max_tokens: 1800,
            stream: false,
            enable_search: true    // 开启联网检索，符合需求
        };

        try {
            const response = await fetch("https://api.deepseek.com/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${apiKey}`
                },
                body: JSON.stringify(requestBody)
            });
            if (!response.ok) {
                const errData = await response.json().catch(() => ({}));
                throw new Error(`API错误 ${response.status}: ${errData.error?.message || '请检查Key或余额'}`);
            }
            const data = await response.json();
            let rawText = data.choices[0].message.content;
            // 后处理：去除过多AI痕迹（多余表情符号、强行排比），但保留专业性和彩蛋
            rawText = rawText.replace(/😊|🤖|🌟|✨/g, '');
            // 确保彩蛋格式统一（如果没有猫咪彩蛋，补一个极简的，但不破坏原意）
            if (!rawText.includes('🐱') && !rawText.includes('喵~')) {
                rawText += "\n\n🐱 喵~ 植物也要听天气预报哦。";
            }
            return rawText;
        } catch (err) {
            console.error(err);
            return `❌ 联网分析失败：${err.message}。请检查网络或 API 配置，稍后重试。`;
        }
    }

    // ----------------------------- 辅助函数 -----------------------------
    function switchTab(tab) {
        state.activeTab = tab;
        render();
    }

    function render() {
        const container = document.getElementById('main-content');
        if (!container) return;
        // 更新导航样式
        document.querySelectorAll('.nav-item').forEach(btn => {
            const id = btn.id?.replace('nav-', '');
            if (id === state.activeTab) {
                btn.className = "nav-item flex flex-col items-center gap-0.5 text-emerald-700 font-semibold scale-105 transition-all";
                btn.querySelector('i')?.setAttribute('stroke-width', '2.5');
            } else {
                btn.className = "nav-item flex flex-col items-center gap-0.5 text-slate-400 transition-all";
                btn.querySelector('i')?.setAttribute('stroke-width', '1.8');
            }
        });
        if (state.activeTab === 'archive') renderArchive(container);
        else if (state.activeTab === 'care') renderCare(container);
        else if (state.activeTab === 'clinic') renderClinic(container);
        else if (state.activeTab === 'community') renderCommunity(container);
        lucide.createIcons();
    }

    // ----------------------------- 档案库模块 (保留原有逻辑) -----------------------------
    function renderArchive(container) {
        container.innerHTML = `
            <div class="p-5">
                <div class="flex justify-between items-end mb-5">
                    <div><h2 class="text-2xl font-extrabold text-slate-800">🌱 植物档案</h2><p class="text-[11px] text-slate-400">记录生长足迹</p></div>
                    <button onclick="showArchiveForm()" class="bg-emerald-600 text-white p-3 rounded-2xl shadow-md active:scale-95 transition"><i data-lucide="plus-circle" class="w-5 h-5"></i></button>
                </div>
                <div class="grid grid-cols-1 gap-4">
                    ${state.archives.length === 0 ? '<div class="py-16 text-center text-slate-300 italic text-sm">📭 暂无档案，点击 + 开始记录</div>' : ''}
                    ${state.archives.map(item => `
                        <div class="bg-white rounded-2xl p-4 shadow-sm border border-slate-100 flex gap-3">
                            <img src="${item.image || 'https://placehold.co/100x100?text=🌿'}" class="w-20 h-20 rounded-xl object-cover bg-slate-50">
                            <div class="flex-1"><h3 class="font-bold text-slate-800">${escapeHtml(item.name)}</h3><p class="text-[10px] text-slate-400">${item.date}</p><p class="text-xs text-slate-500 mt-1 line-clamp-2">${escapeHtml(item.desc || '暂无描述')}</p></div>
                            <button onclick="deleteArchive(${item.id})" class="text-slate-300 hover:text-red-500 self-start"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                        </div>
                    `).join('')}
                </div>
            </div>
        `;
    }
    window.showArchiveForm = function() {
        const container = document.getElementById('main-content');
        container.innerHTML = `<div class="p-5"><div class="bg-white rounded-3xl p-5 shadow-xl border"><div class="flex justify-between items-center mb-4"><h3 class="font-bold">➕ 新建档案</h3><button onclick="render()"><i data-lucide="x"></i></button></div>
        <div class="w-full h-40 bg-slate-50 rounded-2xl border-2 border-dashed border-slate-200 flex flex-col items-center justify-center relative overflow-hidden cursor-pointer" onclick="document.getElementById('file-input-arch').click()">
            <input type="file" id="file-input-arch" class="hidden" accept="image/*" onchange="previewImg(this, 'archPreview')"><div id="archPreview" class="flex flex-col items-center"><i data-lucide="image-plus" class="w-8 h-8 text-slate-300"></i><span class="text-xs">添加图片</span></div>
        </div>
        <input type="text" id="arch-name" placeholder="植物名称" class="w-full mt-3 p-3 bg-slate-50 rounded-xl"><textarea id="arch-desc" placeholder="生长状况/笔记" class="w-full mt-2 p-3 bg-slate-50 rounded-xl h-24"></textarea>
        <button onclick="saveArchive()" class="w-full bg-emerald-600 text-white py-3 rounded-xl font-bold mt-4">保存档案</button></div></div>`;
        lucide.createIcons();
    };
    window.previewImg = function(input, targetId) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = e => { document.getElementById(targetId).innerHTML = `<img src="${e.target.result}" class="w-full h-full object-cover rounded-2xl">`; };
            reader.readAsDataURL(input.files[0]);
        }
    };
    window.saveArchive = function() {
        const name = document.getElementById('arch-name')?.value;
        const desc = document.getElementById('arch-desc')?.value;
        const imgElem = document.querySelector('#archPreview img')?.src;
        if(!name && !desc && !imgElem) return showToast("至少填一项");
        state.archives.unshift({ id: Date.now(), name: name || "无名植株", desc: desc || "", image: imgElem || null, date: new Date().toISOString().slice(0,10) });
        localStorage.setItem('v2_archives', JSON.stringify(state.archives));
        render();
        showToast("✅ 已归档");
    };
    window.deleteArchive = (id) => { state.archives = state.archives.filter(a => a.id !== id); localStorage.setItem('v2_archives', JSON.stringify(state.archives)); render(); showToast("已移除"); };
    
    // ----------------------------- 智能养护 (新增地区+干湿选项 + 生长阶段填空) -----------------------------
    function renderCare(container) {
        container.innerHTML = `
            <div class="p-5 space-y-5">
                <div class="bg-white p-5 rounded-3xl shadow-sm border border-emerald-50">
                    <h2 class="text-lg font-bold mb-3 flex items-center gap-2"><i data-lucide="sun-medium" class="text-amber-500"></i> 智能养护顾问</h2>
                    <div class="space-y-3">
                        <input type="text" id="care-name" placeholder="植物名称 (例: 蝴蝶兰、琴叶榕)" class="w-full p-3 bg-slate-50 rounded-xl outline-none focus:ring-2 focus:ring-emerald-400">
                        <div class="flex gap-2">
                            <div class="flex-1 bg-slate-50 p-2 rounded-xl"><label class="text-[10px] text-slate-400">🌡️ 温度(℃)</label><input type="number" id="care-temp" value="22" class="w-full bg-transparent font-medium"></div>
                            <div class="flex-1 bg-slate-50 p-2 rounded-xl"><label class="text-[10px] text-slate-400">📍 地区</label><select id="care-region" class="w-full bg-transparent text-sm font-medium"><option value="北方">北方</option><option value="南方" selected>南方</option></select></div>
                        </div>
                        <div class="flex gap-2">
                            <div class="flex-1 bg-slate-50 p-2 rounded-xl"><label class="text-[10px] text-slate-400">💧 环境湿度倾向</label><select id="care-humidity" class="w-full bg-transparent text-sm"><option value="干燥">干燥 (暖气/空调房)</option><option value="湿润" selected>湿润 (多雨/高湿)</option></select></div>
                            <div class="flex-1 bg-slate-50 p-2 rounded-xl"><label class="text-[10px] text-slate-400">🌿 生长阶段</label><input type="text" id="care-stage" placeholder="例: 幼苗期/花蕾期" value="成长期" class="w-full bg-transparent text-sm"></div>
                        </div>
                        <button onclick="getCareAdvice()" id="btn-care" class="w-full bg-emerald-700 text-white py-3.5 rounded-xl font-bold shadow-md active:scale-95 transition-all">🔍 生成科学养护方案</button>
                    </div>
                </div>
                <div id="care-result" class="ai-content"></div>
            </div>
        `;
        lucide.createIcons();
    }

    window.getCareAdvice = async function() {
        const plant = document.getElementById('care-name')?.value.trim();
        if (!plant) return showToast("请填写植物名称");
        const temp = document.getElementById('care-temp')?.value || 22;
        const region = document.getElementById('care-region')?.value;
        const humidity = document.getElementById('care-humidity')?.value;
        const stage = document.getElementById('care-stage')?.value || "成长期";
        const query = `植物名称: ${plant}。当前环境: ${region}地区, ${humidity}倾向, 温度${temp}℃, 处于${stage}阶段。请结合最新农业资料及气候数据, 提供精确养护建议: 1)浇水策略(频率及水量) 2)光照要求(直射/散射/时长) 3)肥料配比及施肥周期 4)该季节常见风险预警。要求分段分点, 数据详实。`;
        
        const btn = document.getElementById('btn-care');
        const resultDiv = document.getElementById('care-result');
        btn.disabled = true; btn.innerHTML = `<span class="flex items-center gap-2 justify-center"><i data-lucide="refresh-cw" class="animate-spin w-4 h-4"></i> 联网检索文献中...</span>`;
        lucide.createIcons();
        const aiReply = await callAI(query);
        resultDiv.innerHTML = `<div class="bg-white p-5 rounded-2xl border border-emerald-100 shadow-sm fade-enter"><div class="text-sm text-slate-700 whitespace-pre-wrap leading-relaxed">${aiReply.replace(/\n/g, '<br>')}</div></div>`;
        btn.disabled = false; btn.innerHTML = "🔍 生成科学养护方案";
    };

    // ----------------------------- 病理诊断 (同步增加地区+湿度+填空阶段) -----------------------------
    function renderClinic(container) {
        container.innerHTML = `
            <div class="p-5 space-y-5">
                <div class="bg-white p-5 rounded-3xl shadow-sm border-l-4 border-rose-400">
                    <h2 class="text-lg font-bold mb-3 flex items-center gap-2"><i data-lucide="activity" class="text-rose-500"></i> 植物诊所 · 智能诊断</h2>
                    <div class="space-y-3">
                        <div class="w-full h-36 bg-rose-50/30 rounded-2xl border-2 border-dashed border-rose-200 flex flex-col items-center justify-center relative overflow-hidden cursor-pointer" onclick="document.getElementById('clinic-file-input').click()">
                            <input type="file" id="clinic-file-input" class="hidden" accept="image/*" onchange="previewImg(this, 'clinicImgPreview')">
                            <div id="clinicImgPreview" class="flex flex-col items-center"><i data-lucide="camera" class="w-6 h-6 text-rose-300"></i><span class="text-[11px] text-rose-400 mt-1">上传病叶/病斑照片(辅助描述)</span></div>
                        </div>
                        <textarea id="clinic-symptom" placeholder="详细描述病症: 叶尖枯黄、叶片卷曲、白色霉层、茎干软腐等..." class="w-full p-3 bg-slate-50 rounded-xl h-24 outline-none focus:ring-2 focus:ring-rose-300 text-sm"></textarea>
                        <div class="flex flex-wrap gap-2">
                            <div class="flex-1 min-w-[100px] bg-slate-50 p-2 rounded-lg"><label class="text-[10px] text-slate-400">🌡️ 温度</label><input type="number" id="clinic-temp" placeholder="℃" class="w-full bg-transparent text-sm"></div>
                            <div class="flex-1 min-w-[100px] bg-slate-50 p-2 rounded-lg"><label class="text-[10px] text-slate-400">📍 地区</label><select id="clinic-region"><option value="北方">北方</option><option value="南方" selected>南方</option></select></div>
                            <div class="flex-1 min-w-[100px] bg-slate-50 p-2 rounded-lg"><label class="text-[10px] text-slate-400">💧 湿度倾向</label><select id="clinic-humidity"><option value="干燥">干燥</option><option value="湿润" selected>湿润</option></select></div>
                        </div>
                        <div class="bg-slate-50 p-2 rounded-lg"><label class="text-[10px] text-slate-400">🌱 生长阶段 (填空)</label><input type="text" id="clinic-stage" placeholder="例: 开花期/幼苗/休眠" class="w-full bg-transparent text-sm"></div>
                        <button onclick="getDiagnosis()" id="btn-clinic" class="w-full bg-rose-600 text-white py-3.5 rounded-xl font-bold shadow-md active:scale-95 transition">🔬 提交专家诊断 + 网络文献</button>
                    </div>
                </div>
                <div id="clinic-result" class="ai-content space-y-3"></div>
            </div>
        `;
        lucide.createIcons();
    }

    window.getDiagnosis = async function() {
        const symptom = document.getElementById('clinic-symptom')?.value.trim();
        const imgData = document.querySelector('#clinicImgPreview img')?.src || null;
        if (!symptom && !imgData) return showToast("请描述症状或上传图片");
        const temp = document.getElementById('clinic-temp')?.value || "未知";
        const region = document.getElementById('clinic-region')?.value;
        const humidity = document.getElementById('clinic-humidity')?.value;
        const stage = document.getElementById('clinic-stage')?.value || "不详";
        const query = `【植物病理诊断请求】症状描述: ${symptom || "依据图片大致判断"}。环境: ${region}地区, ${humidity}环境, 温度${temp}℃, 生长阶段: ${stage}。请搜索最新植保数据库, 给出:
        1. 可能的病原/生理病因(区分病害或养护问题)
        2. 科学治疗方案(药剂推荐浓度/物理隔离/修剪方法)
        3. 后期养护调整建议(温湿度、通风、施肥调整)
        要求分点清晰, 避免模糊语言, 引用实际可操作方案。`;
        
        const btn = document.getElementById('btn-clinic');
        const resDiv = document.getElementById('clinic-result');
        btn.disabled = true; btn.innerHTML = `<span class="flex gap-2 justify-center"><i data-lucide="loader-2" class="animate-spin w-4 h-4"></i> 实验室诊断+联网中</span>`;
        lucide.createIcons();
        const reply = await callAI(query, imgData);
        resDiv.innerHTML = `<div class="bg-white p-5 rounded-2xl border border-rose-100 shadow-sm fade-enter"><div class="text-sm whitespace-pre-wrap">${reply.replace(/\n/g, '<br>')}</div>
        <div class="mt-5 pt-3 border-t border-slate-100"><input type="text" id="follow-up-question" placeholder="✏️ 输入追问 (例如: 换什么药?)" class="w-full p-2.5 bg-slate-50 rounded-xl text-xs"><button onclick="askAgainClinic('${reply.replace(/'/g, "\\'")}')" class="mt-2 text-xs text-rose-600 font-semibold">💬 向专家追问</button></div></div>`;
        btn.disabled = false; btn.innerHTML = "🔬 提交专家诊断 + 网络文献";
    };

    window.askAgainClinic = async function(lastContext) {
        const follow = document.getElementById('follow-up-question')?.value;
        if (!follow) return showToast("输入追问内容");
        const query = `基于之前的诊断分析: ${lastContext}。用户追问: ${follow}。请结合最新资料给出专业补充答复。`;
        const result = await callAI(query);
        const resDiv = document.getElementById('clinic-result');
        resDiv.innerHTML += `<div class="bg-emerald-50 p-4 rounded-xl text-emerald-800 text-sm mt-3 fade-enter"><strong>🌿 追问答复：</strong><br>${result.replace(/\n/g, '<br>')}</div>`;
        document.getElementById('follow-up-question').value = '';
    };

    // ----------------------------- 社区交流 (保留完整功能) -----------------------------
    function renderCommunity(container) {
        container.innerHTML = `
            <div class="pb-6"><div class="p-4 sticky top-0 bg-white/80 backdrop-blur-sm flex gap-3 border-b"><div class="w-9 h-9 bg-emerald-100 rounded-full flex items-center justify-center text-lg">🐈</div>
            <div onclick="showPostEditor()" class="flex-1 bg-slate-100 rounded-full px-5 h-10 flex items-center text-slate-400 text-xs cursor-pointer">分享你的植物故事...</div></div>
            <div id="post-list" class="p-4 space-y-5">${state.posts.map(post => `
                <div class="bg-white rounded-2xl p-4 shadow-sm"><div class="flex items-center gap-2 mb-2"><div class="w-7 h-7 bg-slate-200 rounded-full flex items-center justify-center text-xs">🌿</div><span class="font-semibold text-sm">${escapeHtml(post.author)}</span></div>
                <p class="text-sm text-slate-600 mb-3">${escapeHtml(post.content)}</p>${post.image ? `<img src="${post.image}" class="w-full rounded-xl mb-3 max-h-48 object-cover">` : ''}
                <div class="flex gap-6 text-slate-400 pt-2"><button onclick="likePost(${post.id})" class="flex items-center gap-1 ${post.liked ? 'text-rose-500' : ''}"><i data-lucide="heart" class="w-4 h-4 ${post.liked ? 'fill-current' : ''}"></i><span class="text-xs">${post.likes}</span></button>
                <div class="flex items-center gap-1"><i data-lucide="message-square" class="w-4 h-4"></i><span class="text-xs">${post.comments?.length || 0}</span></div></div>
                <div class="mt-3 space-y-2">${(post.comments || []).map(c => `<div class="bg-slate-50 p-2 rounded-lg text-[11px]"><span class="font-semibold">花友：</span> ${escapeHtml(c.text)}</div>`).join('')}
                <div class="flex gap-2 mt-2"><input type="text" id="cmt-${post.id}" placeholder="写评论..." class="flex-1 bg-slate-50 rounded-full px-3 py-1.5 text-xs"><button onclick="addComment(${post.id})" class="text-emerald-600 text-xs font-bold">回复</button></div></div></div>
            `).join('')}</div></div>
        `;
        lucide.createIcons();
    }
    window.showPostEditor = function() {
        const container = document.getElementById('main-content');
        container.innerHTML = `<div class="p-5"><div class="bg-white rounded-3xl p-5"><div class="flex justify-between"><h3 class="font-bold">新动态</h3><button onclick="render()"><i data-lucide="x"></i></button></div>
        <textarea id="postContent" placeholder="分享植物养护心得..." class="w-full p-3 bg-slate-50 rounded-xl h-28 my-3"></textarea><div id="postImagePreview" class="mb-2"></div>
        <button onclick="document.getElementById('postImgFile').click()" class="text-xs text-emerald-600 flex items-center gap-1"><i data-lucide="image"></i> 添加图片</button><input type="file" id="postImgFile" class="hidden" accept="image/*" onchange="previewImg(this,'postImagePreview')">
        <button onclick="submitPost()" class="w-full bg-emerald-600 text-white py-3 rounded-xl font-bold mt-4">发布</button></div></div>`;
        lucide.createIcons();
    };
    window.submitPost = function() {
        const content = document.getElementById('postContent')?.value;
        const img = document.querySelector('#postImagePreview img')?.src;
        if (!content && !img) return;
        state.posts.unshift({ id: Date.now(), author: "我", content: content || "分享图片", image: img || null, likes: 0, liked: false, comments: [] });
        localStorage.setItem('v2_posts', JSON.stringify(state.posts));
        render(); showToast("发布成功");
    };
    window.likePost = (id) => { state.posts = state.posts.map(p => { if(p.id === id){ p.liked = !p.liked; p.likes += p.liked ? 1 : -1; } return p; }); localStorage.setItem('v2_posts', JSON.stringify(state.posts)); render(); };
    window.addComment = (postId) => { const inp = document.getElementById(`cmt-${postId}`); if(!inp?.value) return; state.posts = state.posts.map(p => { if(p.id === postId){ p.comments = p.comments || []; p.comments.push({ text: inp.value, time: new Date().toLocaleTimeString() }); } return p; }); localStorage.setItem('v2_posts', JSON.stringify(state.posts)); render(); showToast("评论已发送"); };
    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
    
    // API Key 管理
    function saveApiKey() {
        const newKey = document.getElementById('apiKeyInput').value.trim();
        if(newKey) {
            apiKey = newKey;
            localStorage.setItem('deepseek_api_key', newKey);
            showToast("✅ API Key已保存，现在可以使用联网分析");
            closeApiModal();
        } else { showToast("请输入有效Key"); }
    }
    function closeApiModal() { document.getElementById('apiModal').classList.add('hidden'); }
    document.getElementById('apiKeyBtn')?.addEventListener('click', () => {
        document.getElementById('apiKeyInput').value = apiKey;
        document.getElementById('apiModal').classList.remove('hidden');
        lucide.createIcons();
    });
    window.closeApiModal = closeApiModal;
    window.saveApiKey = saveApiKey;
    
    // 初始化
    window.onload = () => { render(); if(apiKey) showToast("🌿 DeepSeek 已就绪", 1500); else showToast("请点击🔑配置API Key", 2500); };
</script>
</body>
</html>
